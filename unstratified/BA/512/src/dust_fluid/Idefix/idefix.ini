[Grid]
X1-grid    1  -1.0  512  u  1.0
X2-grid    1  -1.0  1  u  1.0
X3-grid    1  -1.0  512  u  1.0

[TimeIntegrator]
CFL         0.9
tstop       629.3000000000001
first_dt    1.e-6
nstages     2

[Hydro]
solver         hllc
rotation       1.0
shearingBox    -1.5
csiso          constant  1.0

[Dust]
solver           hll_dust
nSpecies         1
drag             tau  1.0  
drag_feedback    yes

[Gravity]
bodyForce    userdef

[Boundary]
X1-beg    shearingbox
X1-end    shearingbox
X2-beg    periodic
X2-end    periodic
X3-beg    periodic
X3-end    periodic

[Setup]
epsilon    0.1     # Pressure gradient (=2*eta*omega*vk)
chi         0.2  

[Output]
vtk    6.283000000000001
dmp    6.283000000000001
analysis    0.6283000000000001
